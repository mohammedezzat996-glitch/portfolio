<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض مشاريعي الإبداعية</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar"><div class="nav-container"><a href="/" class="logo">🎯 معرض أعمالي</a></div></nav>
    <main class="main-content">
        {% if messages %}{% for msg in messages %}<div style="padding:15px; background:#D49B23; color:white; margin-bottom:20px; border-radius:8px;">{{ msg }}</div>{% endfor %}{% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer class="footer"><p>جميع الحقوق محفوظة © 2026 | تصميم فاتح خردلي فخم</p></footer>
</body>
</html>
